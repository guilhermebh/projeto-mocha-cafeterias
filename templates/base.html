<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Mocha | Premium Coffee Experience{% endblock %}</title>
    <meta name="description" content="Descubra as melhores cafeterias com Mocha. Uma experiência premium.">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    
    <!-- Shared CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/layout.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/utilities.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    {% block extra_css %}{% endblock %}
</head>
<body class="dark-theme {% block body_class %}{% endblock %}">
    
    <nav class="glass-nav">
        <div class="logo">
            <i class='bx bx-coffee-togo'></i>
            <span>MOCHA</span>
        </div>                              
        <ul class="nav-links">
            <li><a href="{{ url_for('index') }}" class="{% if request.endpoint == 'index' %}active{% endif %}">Home</a></li>
            <li><a href="{{ url_for('cafes') }}" class="{% if request.endpoint == 'cafes' %}active{% endif %}">Cafeterias</a></li>
            <li><a href="{{ url_for('sobre') }}" class="{% if request.endpoint == 'sobre' %}active{% endif %}">Sobre Nós</a></li>
        </ul>                
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    {% block footer %}
    <footer class="footer">
        <i class='bx bx-coffee bx-tada'></i> Desenvolvido com paixão e cafeína.
    </footer>
    {% endblock %}

    <!-- Scripts -->
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
